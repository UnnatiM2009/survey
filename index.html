<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Feedback Survey</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;}
  body{background:#000;color:#fff;min-height:100vh;display:flex;justify-content:center;}
  .card{width:100%;max-width:480px;padding:28px 22px 50px;}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:34px;}
  .logo-mark{font-size:34px;color:#cfcfcf;font-weight:700;letter-spacing:-2px;}
  .logo-sub{font-size:8px;letter-spacing:3px;color:#bdbdbd;margin-top:4px;}
  .logo-right{font-size:26px;font-weight:700;color:#fff;}
  h1{font-size:20px;margin-bottom:6px;}
  p.sub{color:#9e9e9e;font-size:13px;margin-bottom:26px;}
  label{display:block;font-size:14px;font-weight:600;margin:18px 0 6px;}
  input,select{
    width:100%;padding:14px;border-radius:6px;border:1px solid #777;
    background:#0b0b0b;color:#fff;font-size:16px;
  }
  input::placeholder{color:#777;}
  .btn{
    width:100%;margin-top:32px;padding:16px;border:none;border-radius:8px;
    background:#25d366;color:#fff;font-size:17px;font-weight:700;cursor:pointer;
  }
  .btn:active{transform:scale(.98);}
  .btn.sms{background:#1976d2;margin-top:14px;}
  .err{color:#ff6b6b;font-size:13px;margin-top:10px;min-height:18px;}
  .warn{color:#f5b711;font-size:13px;margin-top:6px;min-height:0;}

  /* ---- Send status / confirmation ---- */
  .confirm-box{
    display:none;margin-top:24px;padding:16px;border-radius:10px;
    background:#141414;border:1px solid #f5b711;
  }
  .confirm-box.show{display:block;}
  .confirm-box p{font-size:15px;font-weight:600;margin-bottom:12px;}
  .confirm-box small{display:block;color:#9e9e9e;font-size:12px;margin-bottom:12px;}
  .confirm-actions{display:flex;gap:10px;}
  .confirm-actions button{
    flex:1;padding:13px 8px;border:none;border-radius:8px;
    font-size:15px;font-weight:700;color:#fff;cursor:pointer;
  }
  .yes{background:#2e7d32;}
  .no{background:#c62828;}

  /* ---- Today's list ---- */
  .list-title{margin-top:36px;font-size:16px;font-weight:700;
    border-top:1px solid #333;padding-top:22px;display:flex;justify-content:space-between;align-items:center;}
  .list-title .counts{font-size:12px;font-weight:500;color:#9e9e9e;}
  .rec{
    margin-top:12px;padding:12px 14px;border-radius:8px;background:#101010;
    border-left:5px solid #555;font-size:13px;line-height:1.55;
  }
  .rec.sent{border-left-color:#2e7d32;}
  .rec.notsent{border-left-color:#c62828;background:#1a0d0d;}
  .rec.pending{border-left-color:#f5b711;}
  .rec b{font-size:14px;}
  .status{font-weight:700;}
  .rec.sent .status{color:#66d95c;}
  .rec.notsent .status{color:#ff6b6b;}
  .rec.pending .status{color:#f5b711;}
  .rec .row-actions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
  .rec .row-actions button{
    padding:8px 14px;border:none;border-radius:6px;font-size:13px;
    font-weight:700;color:#fff;cursor:pointer;
  }
  .retry{background:#1976d2;}
  .mark-sent{background:#2e7d32;}
  .empty{color:#777;font-size:13px;margin-top:12px;}
</style>
</head>
<body>
<div class="card">
  <header>
    <div>
      <div class="logo-mark">&#9698;&#9700;</div>
      <div class="logo-sub">SPORT UTILITY VEHICLES</div>
    </div>
    <div class="logo-right">mah&iacute;ndra</div>
  </header>

  <h1>Send Feedback Survey</h1>
  <p class="sub">Enter customer details and tap Send. The survey link will open in WhatsApp, ready to send.</p>

  <label>Vehicle Model</label>
  <select id="model">
    <option value="">Select model</option>
    <option>XUV400</option><option>XUV700</option><option>XUV 3XO</option>
    <option>Scorpio-N</option><option>Scorpio Classic</option><option>Thar</option>
    <option>Thar ROXX</option><option>Bolero</option><option>Bolero Neo</option>
    <option>Marazzo</option><option>BE 6</option><option>XEV 9e</option>
  </select>

  <label>Vehicle Number</label>
  <input id="veh" placeholder="e.g. AP39 AB 1234" style="text-transform:uppercase">

  <label>Customer Mobile Number</label>
  <input id="mob" placeholder="10-digit mobile number" inputmode="numeric" maxlength="10">

  <label>Survey Language / भाषा</label>
  <select id="lang">
    <option value="en">English</option>
    <option value="hi">हिंदी (Hindi)</option>
    <option value="mr">मराठी (Marathi)</option>
  </select>

  <button class="btn" id="sendWA">Send via WhatsApp</button>
  <button class="btn sms" id="sendSMS">Send via SMS</button>
  <div class="err" id="err"></div>
  <div class="warn" id="warn"></div>

  <!-- ===== SEND CONFIRMATION CHECK ===== -->
  <div class="confirm-box" id="confirmBox">
    <p id="confirmQ">Did the message get sent in WhatsApp?</p>
    <small id="confirmInfo"></small>
    <div class="confirm-actions">
      <button class="yes" id="confirmYes">&#10004; Yes, Sent</button>
      <button class="no" id="confirmNo">&#10008; No, Not Sent</button>
    </div>
  </div>

  <!-- ===== TODAY'S SEND LIST ===== -->
  <div class="list-title">
    <span>Today's Surveys</span>
    <span class="counts" id="counts"></span>
  </div>
  <div id="list"></div>
  <div class="empty" id="empty">No surveys sent yet today.</div>
</div>

<script>
/* ============ CONFIG — EDIT THIS ============ */
// Full public URL where feedback_survey.html is hosted:
const SURVEY_URL = "https://unnatim2009.github.io/survey";  // no trailing slash here
const DEALER_NAME = "Unnati Motors";
// Email that receives the "NOT SENT" alert log (same as feedback email):
const LOG_EMAIL = "rnaidu@mlplgroup.com";
/* ============================================ */

/* ---------- message builder (unchanged logic) ---------- */
function buildMessage(){
  const model = document.getElementById("model").value;
  const veh = document.getElementById("veh").value.trim().toUpperCase();
  const mob = document.getElementById("mob").value.trim();
  const err = document.getElementById("err");
  err.textContent = "";
  if(!model){err.textContent="Please select the vehicle model.";return null;}
  if(!veh){err.textContent="Please enter the vehicle number.";return null;}
  if(!/^[6-9]\d{9}$/.test(mob)){err.textContent="Please enter a valid 10-digit mobile number.";return null;}
  const lang = document.getElementById("lang").value;
  const link = SURVEY_URL + "/?model=" + encodeURIComponent(model) + "&veh=" + encodeURIComponent(veh) + "&lang=" + lang + "&mob=" + mob;
  const M = {
    en: "Dear Customer, thank you for servicing your Mahindra " + model + " (" + veh + ") with " + DEALER_NAME + ".\n\n" +
        "Please spare 1 minute to share your feedback:\n" + link + "\n\n" +
        "If anything was not up to your expectations, we will resolve it immediately.",
    hi: "प्रिय ग्राहक, अपनी Mahindra " + model + " (" + veh + ") की सर्विस " + DEALER_NAME + " से कराने के लिए धन्यवाद।\n\n" +
        "कृपया 1 मिनट निकालकर अपनी प्रतिक्रिया दें:\n" + link + "\n\n" +
        "यदि कुछ भी आपकी अपेक्षा के अनुसार नहीं था, तो हम उसे तुरंत हल करेंगे।",
    mr: "प्रिय ग्राहक, तुमच्या Mahindra " + model + " (" + veh + ") ची सर्व्हिस " + DEALER_NAME + " कडून करून घेतल्याबद्दल धन्यवाद.\n\n" +
        "कृपया 1 मिनिट काढून तुमचा अभिप्राय द्या:\n" + link + "\n\n" +
        "काहीही तुमच्या अपेक्षेप्रमाणे नसेल, तर आम्ही ते त्वरित सोडवू."
  };
  return {model, veh, mob, lang, text: M[lang]};
}

/* ============================================================
   SEND-STATUS CHECK LOGIC
   1. Every send attempt is recorded (Pending confirmation).
   2. SA must confirm: "Yes, Sent" or "No, Not Sent".
   3. Not-sent records stay RED in the list with a Retry button.
   4. Not-sent records are also emailed to LOG_EMAIL so
      management knows a customer did NOT get the survey.
   5. Duplicate check: warns if same mobile already sent today.
   Records are stored in localStorage (kept for today only).
   ============================================================ */

const todayKey = "surveyLog_" + new Date().toISOString().slice(0,10);
let records = JSON.parse(localStorage.getItem(todayKey) || "[]");
let pendingId = null;   // record waiting for confirmation

function saveRecords(){ localStorage.setItem(todayKey, JSON.stringify(records)); }

/* ---- create a record for each send attempt ---- */
function addRecord(m, channel){
  const rec = {
    id: Date.now(),
    time: new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),
    model: m.model, veh: m.veh, mob: m.mob, lang: m.lang,
    channel: channel,            // "WhatsApp" or "SMS"
    status: "pending"            // pending -> sent / notsent
  };
  records.unshift(rec);
  saveRecords();
  renderList();
  return rec;
}

/* ---- confirmation box ---- */
function askConfirmation(rec){
  pendingId = rec.id;
  document.getElementById("confirmQ").textContent =
    "Did the message get sent in " + rec.channel + "?";
  document.getElementById("confirmInfo").textContent =
    rec.model + " | " + rec.veh + " | " + rec.mob;
  document.getElementById("confirmBox").classList.add("show");
  document.getElementById("confirmBox").scrollIntoView({behavior:"smooth",block:"center"});
}

function setStatus(id, status){
  const rec = records.find(r => r.id === id);
  if(!rec) return;
  rec.status = status;
  saveRecords();
  renderList();
  if(status === "notsent") emailNotSentLog(rec);   // alert management
}

document.getElementById("confirmYes").onclick = () => {
  if(pendingId){ setStatus(pendingId, "sent"); pendingId = null; }
  document.getElementById("confirmBox").classList.remove("show");
  clearForm();
};
document.getElementById("confirmNo").onclick = () => {
  if(pendingId){ setStatus(pendingId, "notsent"); pendingId = null; }
  document.getElementById("confirmBox").classList.remove("show");
};

function clearForm(){
  document.getElementById("model").value = "";
  document.getElementById("veh").value = "";
  document.getElementById("mob").value = "";
  document.getElementById("warn").textContent = "";
}

/* ---- email log when a survey was NOT sent ---- */
function emailNotSentLog(rec){
  fetch("https://formsubmit.co/ajax/" + LOG_EMAIL, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify({
      _subject: "❌ SURVEY NOT SENT | " + rec.model + " | " + rec.veh,
      _template: "table",
      "1. Date & Time": new Date().toLocaleString("en-IN"),
      "2. Dealership": DEALER_NAME,
      "3. Vehicle Model": rec.model,
      "4. Vehicle Number": rec.veh,
      "5. Customer Mobile": rec.mob,
      "6. Channel": rec.channel,
      "7. Status": "NOT SENT — Service Advisor confirmed the message was not sent",
      "8. ACTION": "Please ensure the survey is re-sent to this customer"
    })
  }).catch(()=>{});
}

/* ---- retry a not-sent record ---- */
function retry(id){
  const rec = records.find(r => r.id === id);
  if(!rec) return;
  // rebuild the message from the stored record
  document.getElementById("model").value = rec.model;
  document.getElementById("veh").value = rec.veh;
  document.getElementById("mob").value = rec.mob;
  document.getElementById("lang").value = rec.lang;
  const m = buildMessage();
  if(!m) return;
  if(rec.channel === "SMS"){
    const sep = /iPhone|iPad|Mac/i.test(navigator.userAgent) ? "&" : "?";
    window.location.href = "sms:+91" + m.mob + sep + "body=" + encodeURIComponent(m.text);
  }else{
    window.open("https://wa.me/91" + m.mob + "?text=" + encodeURIComponent(m.text), "_blank");
  }
  rec.status = "pending";
  saveRecords();
  renderList();
  askConfirmation(rec);
}

/* ---- render today's list ---- */
function renderList(){
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  list.innerHTML = "";
  empty.style.display = records.length ? "none" : "block";

  const sent = records.filter(r=>r.status==="sent").length;
  const notsent = records.filter(r=>r.status==="notsent").length;
  const pending = records.filter(r=>r.status==="pending").length;
  document.getElementById("counts").textContent =
    "Sent: " + sent + "  |  Not Sent: " + notsent + "  |  Pending: " + pending;

  records.forEach(r=>{
    const div = document.createElement("div");
    div.className = "rec " + r.status;
    const statusText = r.status==="sent" ? "✔ SENT"
                     : r.status==="notsent" ? "✖ NOT SENT"
                     : "⏳ PENDING — confirm above";
    div.innerHTML =
      "<b>" + r.model + " | " + r.veh + "</b><br>" +
      "Mobile: " + r.mob + " | " + r.channel + " | " + r.time + "<br>" +
      "Status: <span class='status'>" + statusText + "</span>";
    if(r.status === "notsent" || r.status === "pending"){
      const actions = document.createElement("div");
      actions.className = "row-actions";
      const rb = document.createElement("button");
      rb.className = "retry";
      rb.textContent = "↻ Retry Send";
      rb.onclick = () => retry(r.id);
      actions.appendChild(rb);
      if(r.status === "notsent" || r.status === "pending"){
        const mb = document.createElement("button");
        mb.className = "mark-sent";
        mb.textContent = "✔ Mark as Sent";
        mb.onclick = () => setStatus(r.id, "sent");
        actions.appendChild(mb);
      }
      div.appendChild(actions);
    }
    list.appendChild(div);
  });
}

/* ---- duplicate check ---- */
function duplicateWarn(mob){
  const dup = records.find(r => r.mob === mob && r.status === "sent");
  document.getElementById("warn").textContent =
    dup ? "⚠ Survey already sent to this number today (" + dup.veh + " at " + dup.time + ")." : "";
  return !!dup;
}

/* ---------- send buttons ---------- */
document.getElementById("sendWA").onclick = () => {
  const m = buildMessage();
  if(!m) return;
  duplicateWarn(m.mob);   // warn only, do not block
  const win = window.open("https://wa.me/91" + m.mob + "?text=" + encodeURIComponent(m.text), "_blank");
  const rec = addRecord(m, "WhatsApp");
  if(!win){
    // popup blocked / WhatsApp did not open -> immediately not sent
    setStatus(rec.id, "notsent");
    document.getElementById("err").textContent =
      "WhatsApp could not be opened (popup blocked). Marked as NOT SENT — use Retry.";
    return;
  }
  askConfirmation(rec);
};

document.getElementById("sendSMS").onclick = () => {
  const m = buildMessage();
  if(!m) return;
  duplicateWarn(m.mob);
  const sep = /iPhone|iPad|Mac/i.test(navigator.userAgent) ? "&" : "?";
  window.location.href = "sms:+91" + m.mob + sep + "body=" + encodeURIComponent(m.text);
  const rec = addRecord(m, "SMS");
  askConfirmation(rec);
};

/* ---- init ---- */
renderList();
</script>
</body>
</html>
