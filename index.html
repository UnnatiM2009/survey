<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Feedback Survey</title>
<style>
  :root{
    --bg:#000;--text:#fff;--red:#e02b2b;--amber:#f5b711;
    --green-light:#4caf50;--green:#43a047;--good:#66d95c;
    --fair:#e6d02a;--poor:#f08a8a;--unacc:#ef1f3d;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;}
  body{background:var(--bg);color:var(--text);min-height:100vh;}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 60px;}
  header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 40px;flex-wrap:wrap;gap:16px;}
  .logo-mark{font-size:44px;line-height:1;letter-spacing:-2px;color:#cfcfcf;font-weight:700;}
  .logo-sub{font-size:9px;letter-spacing:4px;color:#bdbdbd;margin-top:6px;}
  .logo-img{height:110px;width:auto;}
  .logo-right{font-size:38px;font-weight:700;letter-spacing:1px;color:#fff;}
  .screen{display:none;animation:fade .25s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .question{font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.4;}
  .scale-labels{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px;}
  .nps{display:flex;flex-wrap:wrap;gap:8px;}
  .nps button{flex:1 1 70px;min-width:56px;height:64px;border:none;border-radius:8px;
    font-size:18px;font-weight:700;color:#fff;cursor:pointer;transition:transform .1s;}
  .nps button:active{transform:scale(.96);}
  .nps button.selected{outline:3px solid #4da3ff;box-shadow:0 0 12px rgba(255,255,255,.4);}
  .exp{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;}
  .exp button{flex:1 1 150px;min-width:130px;padding:18px 10px;border:none;border-radius:8px;
    font-size:17px;font-weight:600;color:#111;cursor:pointer;transition:transform .1s;}
  .exp button:active{transform:scale(.97);}
  .exp button.selected{outline:3px solid #4da3ff;box-shadow:0 0 14px rgba(255,255,255,.5);}
  .exp-msg{margin-top:18px;font-size:16px;font-weight:600;min-height:24px;}
  .reasons{display:none;flex-wrap:wrap;gap:12px;margin-top:18px;}
  .reasons.show{display:flex;}
  .reasons button{flex:1 1 44%;min-width:220px;padding:16px 10px;border:none;border-radius:6px;
    background:#6d6d6d;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s;}
  .reasons button.selected{background:#1976d2;outline:2px solid #9ec9ff;}
  @media(max-width:600px){.reasons button{flex:1 1 100%;min-width:0;}}
  textarea{width:100%;min-height:110px;margin-top:20px;padding:14px;border-radius:4px;
    border:1px solid #fff;background:#000;color:#fff;font-size:15px;resize:vertical;}
  textarea::placeholder{color:#8a8a8a;}
  .nav{display:flex;justify-content:space-between;margin-top:48px;gap:12px;}
  .nav .spacer{flex:1;}
  .btn{background:#0b0b0b;border:1px solid #bdbdbd;color:#fff;border-radius:6px;
    padding:16px 46px;font-size:17px;cursor:pointer;}
  .btn:hover{background:#1c1c1c;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .thanks{text-align:center;padding:70px 10px;}
  .thanks h1{font-size:34px;margin-bottom:10px;}
  .thanks p{color:#cfcfcf;font-size:16px;}
  .sending{color:#9e9e9e;font-size:14px;margin-top:14px;min-height:18px;}
  @media(max-width:600px){
    .logo-img{height:70px;}
    .logo-right{font-size:26px;}
    .question{font-size:17px;}
    .nps button{flex:1 1 26%;height:54px;font-size:16px;}
    .btn{padding:14px 32px;font-size:16px;flex:1;}
    .nav{margin-top:36px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="Mahindra Sport Utility Vehicles" class="logo-img">
    <div class="logo-right">mah&iacute;ndra</div>
  </header>

  <!-- SCREEN 1 : NPS -->
  <section class="screen active" id="s1">
    <div class="question" id="q1">How likely are you to recommend your Mahindra vehicle to others?</div>
    <div class="scale-labels"><span id="lblNot">Not at all likely</span><span id="lblExt">Extremely likely</span></div>
    <div class="nps" id="nps"></div>
    <div class="nav"><span class="spacer"></span><button class="btn" id="next1" disabled>Next</button></div>
  </section>

  <!-- SCREEN 2 : Experience -->
  <section class="screen" id="s2">
    <div class="question" id="q2"></div>
    <div class="exp">
      <button data-v="Excellent" style="background:var(--green-light)">Excellent</button>
      <button data-v="Good" style="background:var(--good)">Good</button>
      <button data-v="Fair" style="background:var(--fair)">Fair</button>
      <button data-v="Poor" style="background:var(--poor)">Poor</button>
      <button data-v="Unacceptable" style="background:var(--unacc);color:#fff">Unacceptable</button>
    </div>
    <div class="exp-msg" id="expMsg"></div>
    <div class="reasons" id="reasons"></div>
    <div class="nav"><button class="btn back">Back</button><button class="btn" id="next2" disabled>Next</button></div>
  </section>

  <!-- SCREEN 3 : Comments -->
  <section class="screen" id="s3">
    <div class="question" id="q3">Would you like to share any thing more about your experience ?</div>
    <textarea id="comment" placeholder="Answer Here"></textarea>
    <div class="nav"><button class="btn back">Back</button><button class="btn" id="submitBtn">Submit</button></div>
    <div class="sending" id="sending"></div>
  </section>

  <!-- SCREEN 4 : Thank you -->
  <section class="screen" id="s4">
    <div class="thanks">
      <h1 id="thanksH">Thank You</h1>
      <p id="thanksSub">For Experiencing Mahindra</p>
      <p style="margin-top:14px" id="thanksNote">Your feedback has been recorded. Our team will reach out if needed.</p>
    </div>
  </section>

</div>

<script>
/* ================= CONFIG — EDIT THIS ================= */
const CONFIG = {
  feedbackEmail: "rnaidu@mlplgroup.com",   // where every feedback is emailed
  dealerName: "UNNATI MOTORS, A DIVISION OF MICROPARK LOGISTICS PRIVATE LIMITED",

  /* ---------- WhatsApp ALERT settings ---------- */
  // Alert triggers when: NPS score is BELOW this number (i.e. 0-6),
  // OR experience is Fair / Poor / Unacceptable.
  alertBelowScore: 7,

  // Managers who receive the WhatsApp alert. ADD AS MANY AS YOU WANT.
  // Each number must be registered ONCE with CallMeBot (free) to get its apikey:
  //   1. On that manager's phone, save CallMeBot number +34 644 51 95 23 in contacts
  //   2. Send this WhatsApp message to it:  I allow callmebot to send me messages
  //   3. CallMeBot replies with an apikey (e.g. 123456) — paste it below
  //   (Current bot number & steps: https://www.callmebot.com/blog/free-api-whatsapp-messages/)
  alertNumbers: [
    { name: "Service Manager", phone: "919209008732", apikey: "PASTE_APIKEY_HERE" }
    // To add more managers, copy the line above, e.g.:
    // ,{ name: "GM",           phone: "919876543210", apikey: "PASTE_APIKEY_HERE" }
    // ,{ name: "Dealer Owner", phone: "919123456789", apikey: "PASTE_APIKEY_HERE" }
  ]
};
/* ====================================================== */

const params = new URLSearchParams(location.search);
const model   = params.get("model")   || "";
const veh     = params.get("veh")     || "";
const lang    = ["en","hi","mr"].includes(params.get("lang")) ? params.get("lang") : "en";
const mob     = params.get("mob")     || "";
const custName= params.get("name")    || "";   // from Excel: Customer Name
const chassis = params.get("chassis") || "";   // from Excel: Chassis Number
const SURVEY_TYPE = "After_Sale_Survey";       // CCCF / Invitation No. are Mahindra-generated — not used here

const T = {
 en:{
  q1:(m,v)=>"How likely are you to recommend your "+(m?"Mahindra "+m:"Mahindra vehicle")+(v?" ("+v+")":"")+" to others?",
  notLikely:"Not at all likely", extLikely:"Extremely likely",
  q2:d=>"How was your service experience at "+d,
  exp:{Excellent:"Excellent",Good:"Good",Fair:"Fair",Poor:"Poor",Unacceptable:"Unacceptable"},
  msgs:{Excellent:"We are thrilled to know that you had an excellent experience with us.",
        Good:"Thank you! We're glad you had a good experience with us.",
        Fair:"Thank you for your feedback. We will work to make your next visit better.",
        Poor:"We are sorry to hear that. Our Service Manager will contact you shortly.",
        Unacceptable:"We sincerely apologize. Our Service Manager will call you immediately to resolve this."},
  sorry:"Sorry, to hear that. Tell us what went wrong (Select all that apply).",
  reasons:{ "Appointment Experience":"Appointment Experience","Cleanliness of vehicle":"Cleanliness of vehicle","Experience with Service advisor":"Experience with Service advisor","Other":"Other","Quality of work done":"Quality of work done","Time taken for service":"Time taken for service","Transparency & Fairness of charges":"Transparency & Fairness of charges","Updates on vehicle status":"Updates on vehicle status","Vehicle handover waiting time":"Vehicle handover waiting time","Workshop amenities":"Workshop amenities" },
  q3:"Would you like to share any thing more about your experience ?",
  placeholder:"Answer Here", next:"Next", back:"Back", submit:"Submit", submitting:"Submitting...",
  thanks:"Thank You", thanksSub:"For Experiencing Mahindra",
  thanksNote:"Your feedback has been recorded. Our team will reach out if needed."
 },
 hi:{
  q1:(m,v)=>"आप अपनी "+(m?"Mahindra "+m:"Mahindra गाड़ी")+(v?" ("+v+")":"")+" को दूसरों को रिकमेंड करने की कितनी संभावना है?",
  notLikely:"बिल्कुल संभावना नहीं", extLikely:"पूरी संभावना",
  q2:d=>d+" में आपका सर्विस अनुभव कैसा रहा?",
  exp:{Excellent:"उत्कृष्ट",Good:"अच्छा",Fair:"ठीक-ठाक",Poor:"खराब",Unacceptable:"अस्वीकार्य"},
  msgs:{Excellent:"हमें खुशी है कि आपका अनुभव उत्कृष्ट रहा।",
        Good:"धन्यवाद! हमें खुशी है कि आपका अनुभव अच्छा रहा।",
        Fair:"आपकी प्रतिक्रिया के लिए धन्यवाद। हम आपकी अगली विज़िट को बेहतर बनाने का प्रयास करेंगे।",
        Poor:"हमें खेद है। हमारे सर्विस मैनेजर जल्द ही आपसे संपर्क करेंगे।",
        Unacceptable:"हम क्षमा चाहते हैं। हमारे सर्विस मैनेजर तुरंत आपको कॉल करके समाधान करेंगे।"},
  sorry:"यह सुनकर खेद हुआ। कृपया बताएं क्या गलत हुआ (जो भी लागू हों चुनें)।",
  reasons:{ "Appointment Experience":"अपॉइंटमेंट अनुभव","Cleanliness of vehicle":"गाड़ी की सफाई","Experience with Service advisor":"सर्विस एडवाइज़र के साथ अनुभव","Other":"अन्य","Quality of work done":"काम की गुणवत्ता","Time taken for service":"सर्विस में लगा समय","Transparency & Fairness of charges":"शुल्क में पारदर्शिता और निष्पक्षता","Updates on vehicle status":"गाड़ी की स्थिति की जानकारी","Vehicle handover waiting time":"गाड़ी हैंडओवर में प्रतीक्षा समय","Workshop amenities":"वर्कशॉप सुविधाएँ" },
  q3:"क्या आप अपने अनुभव के बारे में कुछ और बताना चाहेंगे?",
  placeholder:"यहाँ लिखें", next:"आगे", back:"पीछे", submit:"सबमिट करें", submitting:"भेजा जा रहा है...",
  thanks:"धन्यवाद", thanksSub:"Mahindra अनुभव के लिए",
  thanksNote:"आपकी प्रतिक्रिया दर्ज कर ली गई है। आवश्यकता होने पर हमारी टीम आपसे संपर्क करेगी।"
 },
 mr:{
  q1:(m,v)=>"तुम्ही तुमची "+(m?"Mahindra "+m:"Mahindra गाडी")+(v?" ("+v+")":"")+" इतरांना रिकमेंड करण्याची किती शक्यता आहे?",
  notLikely:"अजिबात शक्यता नाही", extLikely:"पूर्ण शक्यता",
  q2:d=>d+" येथे तुमचा सर्व्हिस अनुभव कसा होता?",
  exp:{Excellent:"उत्कृष्ट",Good:"चांगला",Fair:"ठीक",Poor:"वाईट",Unacceptable:"अस्वीकार्य"},
  msgs:{Excellent:"तुमचा अनुभव उत्कृष्ट होता हे जाणून आम्हाला आनंद झाला.",
        Good:"धन्यवाद! तुमचा अनुभव चांगला होता याचा आम्हाला आनंद आहे.",
        Fair:"तुमच्या अभिप्रायाबद्दल धन्यवाद. पुढील भेट अधिक चांगली करण्याचा आम्ही प्रयत्न करू.",
        Poor:"आम्हाला खेद आहे. आमचे सर्व्हिस मॅनेजर लवकरच तुमच्याशी संपर्क साधतील.",
        Unacceptable:"आम्ही क्षमा मागतो. आमचे सर्व्हिस मॅनेजर त्वरित कॉल करून समस्या सोडवतील."},
  sorry:"हे ऐकून वाईट वाटले. कृपया काय चुकले ते सांगा (लागू असलेले सर्व निवडा).",
  reasons:{ "Appointment Experience":"अपॉइंटमेंट अनुभव","Cleanliness of vehicle":"गाडीची स्वच्छता","Experience with Service advisor":"सर्व्हिस अ‍ॅडव्हायझरसोबतचा अनुभव","Other":"इतर","Quality of work done":"कामाची गुणवत्ता","Time taken for service":"सर्व्हिससाठी लागलेला वेळ","Transparency & Fairness of charges":"शुल्कातील पारदर्शकता व निष्पक्षता","Updates on vehicle status":"गाडीच्या स्थितीची माहिती","Vehicle handover waiting time":"गाडी हँडओव्हर प्रतीक्षा वेळ","Workshop amenities":"वर्कशॉप सुविधा" },
  q3:"तुम्हाला तुमच्या अनुभवाबद्दल आणखी काही सांगायचे आहे का?",
  placeholder:"येथे लिहा", next:"पुढे", back:"मागे", submit:"सबमिट करा", submitting:"पाठवत आहे...",
  thanks:"धन्यवाद", thanksSub:"Mahindra अनुभवासाठी",
  thanksNote:"तुमचा अभिप्राय नोंदवला गेला आहे. गरज पडल्यास आमची टीम तुमच्याशी संपर्क साधेल."
 }
};
const L = T[lang];

document.getElementById("q1").textContent = L.q1(model, veh);
document.getElementById("q2").textContent = L.q2(CONFIG.dealerName);
document.getElementById("lblNot").textContent = L.notLikely;
document.getElementById("lblExt").textContent = L.extLikely;
document.getElementById("q3").textContent = L.q3;
document.getElementById("comment").placeholder = L.placeholder;
document.getElementById("next1").textContent = L.next;
document.getElementById("next2").textContent = L.next;
document.getElementById("submitBtn").textContent = L.submit;
document.querySelectorAll(".back").forEach(b=>b.textContent=L.back);
document.querySelectorAll(".exp button").forEach(b=>{ b.textContent = L.exp[b.dataset.v]; });
document.getElementById("thanksH").textContent = L.thanks;
document.getElementById("thanksSub").textContent = L.thanksSub;
document.getElementById("thanksNote").textContent = L.thanksNote;

/* NPS 0-10 */
const npsWrap = document.getElementById("nps");
let npsScore = null, expChoice = null;
for (let i = 0; i <= 10; i++) {
  const b = document.createElement("button");
  b.textContent = i;
  b.style.background = i<=6 ? "var(--red)" : i<=8 ? "var(--amber)" : i===9 ? "var(--green-light)" : "var(--green)";
  b.onclick = () => {
    npsScore = i;
    npsWrap.querySelectorAll("button").forEach(x=>x.classList.remove("selected"));
    b.classList.add("selected");
    document.getElementById("next1").disabled = false;
  };
  npsWrap.appendChild(b);
}

/* Experience */
const REASON_KEYS = ["Appointment Experience","Cleanliness of vehicle","Experience with Service advisor","Other","Quality of work done","Time taken for service","Transparency & Fairness of charges","Updates on vehicle status","Vehicle handover waiting time","Workshop amenities"];
let selectedReasons = [];
const reasonsWrap = document.getElementById("reasons");
REASON_KEYS.forEach(k=>{
  const rb = document.createElement("button");
  rb.type = "button";
  rb.dataset.k = k;
  rb.textContent = L.reasons[k];
  rb.onclick = ()=>{
    rb.classList.toggle("selected");
    selectedReasons = Array.from(reasonsWrap.querySelectorAll("button.selected")).map(x=>x.dataset.k);
  };
  reasonsWrap.appendChild(rb);
});

document.querySelectorAll(".exp button").forEach(b=>{
  b.onclick=()=>{
    expChoice=b.dataset.v;
    document.querySelectorAll(".exp button").forEach(x=>x.classList.remove("selected"));
    b.classList.add("selected");
    const bad = ["Fair","Poor","Unacceptable"].includes(expChoice);
    if(bad){
      document.getElementById("expMsg").textContent = L.sorry;
      reasonsWrap.classList.add("show");
    }else{
      document.getElementById("expMsg").textContent = L.msgs[expChoice];
      reasonsWrap.classList.remove("show");
      reasonsWrap.querySelectorAll("button").forEach(x=>x.classList.remove("selected"));
      selectedReasons = [];
    }
    document.getElementById("next2").disabled=false;
  };
});

/* Navigation */
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0);}
document.getElementById("next1").onclick=()=>show("s2");
document.getElementById("next2").onclick=()=>show("s3");
document.querySelectorAll(".back").forEach((b,i)=>{b.onclick=()=>show(i===0?"s1":"s2");});

/* ============================================================
   WHATSAPP ALERT LOGIC
   Triggered when: NPS score below CONFIG.alertBelowScore (0-6)
   OR experience is Fair / Poor / Unacceptable.
   Sends an automatic WhatsApp message to every number in
   CONFIG.alertNumbers via the free CallMeBot API.
   ============================================================ */

// Decide whether this feedback needs an alert
function isNegativeFeedback(){
  const badScore = (npsScore !== null && npsScore < CONFIG.alertBelowScore); // 0-6
  const badExp   = ["Fair","Poor","Unacceptable"].includes(expChoice);
  return badScore || badExp;
}

// Build the alert text sent to managers (always in English for staff)
function buildAlertMessage(comment, now){
  return [
    "🚨 *NEGATIVE FEEDBACK ALERT* 🚨",
    "",
    "*Survey Type:* " + SURVEY_TYPE,
    "*Dealership:* Unnati Motors",
    "*Date & Time:* " + now,
    "*Customer Name:* " + (custName || "-"),
    "*Vehicle Model:* " + (model || "-"),
    "*Vehicle Number:* " + (veh || "-"),
    "*Chassis Number:* " + (chassis || "-"),
    "*Customer Mobile:* " + (mob || "-"),
    "",
    "*Recommend Score:* " + (npsScore !== null ? npsScore + "/10" : "-"),
    "*Service Experience:* " + (expChoice || "-"),
    "*What Went Wrong:* " + (selectedReasons.length ? selectedReasons.join(", ") : "-"),
    "*Customer Comments:* " + (comment || "(no comments)"),
    "",
    "⚠️ *ACTION REQUIRED:* Call the customer within 4 hours." +
    (mob ? "\n📞 Call now: " + mob : "")
  ].join("\n");
}

// Send the alert to ALL configured numbers ONE BY ONE (sequential,
// with a gap between each — proper manner, avoids API rate limits).
// Never blocks or fails the customer's submission.
const wait = ms => new Promise(res => setTimeout(res, ms));
async function sendWhatsAppAlerts(comment, now){
  if(!isNegativeFeedback()) return;                 // only negative feedback
  const text = buildAlertMessage(comment, now);
  const targets = CONFIG.alertNumbers
    .filter(n => n.phone && n.apikey && n.apikey !== "PASTE_APIKEY_HERE");
  for(let i = 0; i < targets.length; i++){
    const n = targets[i];
    const url = "https://api.callmebot.com/whatsapp.php" +
                "?phone=+" + n.phone.replace(/^\+/, "") +
                "&text=" + encodeURIComponent(text) +
                "&apikey=" + encodeURIComponent(n.apikey);
    try{
      // mode:"no-cors" — response is opaque but the message IS delivered
      await fetch(url, { method: "GET", mode: "no-cors" });
    }catch(e){ /* continue with next number even if one fails */ }
    if(i < targets.length - 1) await wait(2000);    // 2s gap between numbers
  }
}

/* Submit -> email via FormSubmit + WhatsApp alert if negative */
document.getElementById("submitBtn").onclick = async () => {
  const btn = document.getElementById("submitBtn");
  const comment = document.getElementById("comment").value.trim();
  const flag = isNegativeFeedback();
  const now = new Date().toLocaleString("en-IN");
  btn.disabled = true;
  document.getElementById("sending").textContent = L.submitting;

  // 1) Email (every feedback)
  const emailJob = fetch("https://formsubmit.co/ajax/" + CONFIG.feedbackEmail, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify({
      _subject: (flag ? "⚠️ ATTENTION NEEDED | " : "✅ ") + "Customer Feedback | " + (model || "Vehicle") + " | " + (veh || "-"),
      _template: "table",
      "01. Survey Type": SURVEY_TYPE,
      "02. Status": "Completed",
      "03. Date & Time": now,
      "04. Dealership": CONFIG.dealerName,
      "05. Customer Name": custName || "-",
      "06. Product (Model)": model || "-",
      "07. Vehicle Number": veh || "-",
      "08. Chassis Number": chassis || "-",
      "09. Customer Mobile Number": mob || "-",
      "10. Recommend Score (0-10)": npsScore,
      "11. Service Experience": expChoice,
      "12. What Went Wrong": selectedReasons.length ? selectedReasons.join(", ") : "-",
      "13. Customer Comments": comment || "(no comments)",
      "14. Survey Language": lang==="hi"?"Hindi":lang==="mr"?"Marathi":"English",
      "15. ACTION REQUIRED": flag ? "YES - Service Manager must call customer within 4 hours" : "No - customer satisfied",
      "16. WhatsApp Alert Sent To": flag ? CONFIG.alertNumbers.map(n=>n.name+" ("+n.phone+")").join(", ") : "-"
    })
  }).catch(()=>{});

  // 2) WhatsApp alert to managers (only if negative feedback)
  const waJob = sendWhatsAppAlerts(comment, now);

  try{ await Promise.allSettled([emailJob, waJob]); }
  catch(e){ /* still thank the customer; do not block them */ }
  show("s4");
};
</script>
</body>
</html>
